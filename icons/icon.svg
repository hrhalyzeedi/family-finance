<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3A5F8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C4A6E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Outer coin ring -->
  <circle cx="256" cy="256" r="175" fill="url(#coin)" opacity="0.95"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="#3A5F8A" stroke-width="6" opacity="0.3"/>
  <!-- Inner coin -->
  <circle cx="256" cy="256" r="135" fill="#C9A84C"/>
  <!-- Arabic letter ج styled as financial symbol -->
  <text x="256" y="300" font-family="Arial, sans-serif" font-size="140" font-weight="900"
        text-anchor="middle" fill="#2C4A6E" opacity="0.95">ج</text>
  <!-- Small decorative stars -->
  <circle cx="256" cy="128" r="8" fill="#3A5F8A" opacity="0.5"/>
  <circle cx="256" cy="384" r="8" fill="#3A5F8A" opacity="0.5"/>
  <circle cx="128" cy="256" r="8" fill="#3A5F8A" opacity="0.5"/>
  <circle cx="384" cy="256" r="8" fill="#3A5F8A" opacity="0.5"/>
</svg>